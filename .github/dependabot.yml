version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    
    open-pull-requests-limit: 0
    
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    
    reviewers:
      - "SamirTheSWE"
    assignees:
      - "SamirTheSWE"
    labels:
      - "dependabot"
    
    rebase-strategy: "auto"
    target-branch: "main"
